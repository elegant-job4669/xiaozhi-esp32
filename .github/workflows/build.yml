name: Build bread-compact-wifi-128x64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - cursor/**
  pull_request:
    branches:
      - main
      - cursor/**

permissions:
  contents: read

env:
  BOARD: bread-compact-wifi
  VARIANT: bread-compact-wifi-128x64

jobs:
  build:
    name: Build ${{ env.VARIANT }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py "$BOARD" --name "$VARIANT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_${{ env.VARIANT }}_${{ github.sha }}
          path: build/merged-binary.bin
          if-no-files-found: error
